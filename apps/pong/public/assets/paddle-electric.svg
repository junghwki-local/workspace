<svg xmlns="http://www.w3.org/2000/svg" width="220" height="28" viewBox="0 0 220 28">
  <defs>
    <clipPath id="c">
      <rect x="1" y="2" width="218" height="22" rx="11"/>
    </clipPath>
    <linearGradient id="eg" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#443300"/>
      <stop offset="45%"  stop-color="#ddaa00"/>
      <stop offset="100%" stop-color="#ffee44"/>
    </linearGradient>
    <linearGradient id="eh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#221100" stop-opacity="0.7"/>
      <stop offset="18%"  stop-color="transparent"/>
      <stop offset="82%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#221100" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- 글로우 -->
  <rect x="5" y="8" width="210" height="14" rx="7" fill="#ffdd00" opacity="0.55"/>

  <g clip-path="url(#c)">
    <rect x="0" y="0" width="220" height="28" fill="url(#eg)"/>
    <rect x="0" y="0" width="220" height="28" fill="url(#eh)"/>

    <!-- 번개 1 -->
    <polyline points="30,2  24,13  33,13  27,26" fill="none" stroke="#ffffff" stroke-width="2"   opacity="0.9"/>
    <!-- 번개 2 -->
    <polyline points="68,2  62,13  71,13  65,26" fill="none" stroke="#fff8aa" stroke-width="1.5" opacity="0.8"/>
    <!-- 번개 3 (중앙 메인) -->
    <polyline points="112,2 103,15 115,15 106,26" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="1"/>
    <!-- 번개 4 -->
    <polyline points="152,2 146,13 155,13 149,26" fill="none" stroke="#fff8aa" stroke-width="1.5" opacity="0.8"/>
    <!-- 번개 5 -->
    <polyline points="192,2 186,13 195,13 189,26" fill="none" stroke="#ffffff" stroke-width="2"   opacity="0.9"/>

    <!-- 방전 스파크 (작은 횡선) -->
    <line x1="45"  y1="10" x2="58"  y2="10" stroke="#ffe060" stroke-width="1" opacity="0.5"/>
    <line x1="85"  y1="16" x2="98"  y2="16" stroke="#ffe060" stroke-width="1" opacity="0.5"/>
    <line x1="124" y1="10" x2="138" y2="10" stroke="#ffe060" stroke-width="1" opacity="0.5"/>
    <line x1="164" y1="16" x2="177" y2="16" stroke="#ffe060" stroke-width="1" opacity="0.5"/>

    <!-- 상단 하이라이트 -->
    <rect x="12" y="2" width="196" height="5" rx="2.5" fill="#fffaaa" opacity="0.55"/>
  </g>

  <!-- 테두리 -->
  <rect x="1" y="2" width="218" height="22" rx="11" fill="none" stroke="#ffcc00" stroke-width="1.5"/>
</svg>
