<svg xmlns="http://www.w3.org/2000/svg" width="220" height="28" viewBox="0 0 220 28">
  <defs>
    <clipPath id="c">
      <rect x="1" y="2" width="218" height="22" rx="11"/>
    </clipPath>
    <linearGradient id="ig" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"   stop-color="#001a44"/>
      <stop offset="50%"  stop-color="#0077cc"/>
      <stop offset="100%" stop-color="#cceeff"/>
    </linearGradient>
    <linearGradient id="ih" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#001133" stop-opacity="0.6"/>
      <stop offset="20%"  stop-color="transparent"/>
      <stop offset="80%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#001133" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- 글로우 -->
  <rect x="5" y="8" width="210" height="14" rx="7" fill="#00aaff" opacity="0.4"/>

  <g clip-path="url(#c)">
    <!-- 베이스 그라디언트 -->
    <rect x="0" y="0" width="220" height="28" fill="url(#ig)"/>
    <!-- 좌우 어둠 -->
    <rect x="0" y="0" width="220" height="28" fill="url(#ih)"/>
    <!-- 크리스탈 패싯 라인 -->
    <line x1="35"  y1="2" x2="55"  y2="26" stroke="#88ddff" stroke-width="1.2" opacity="0.45"/>
    <line x1="70"  y1="2" x2="90"  y2="26" stroke="#88ddff" stroke-width="1.2" opacity="0.45"/>
    <line x1="105" y1="2" x2="125" y2="26" stroke="#88ddff" stroke-width="1.2" opacity="0.45"/>
    <line x1="140" y1="2" x2="160" y2="26" stroke="#88ddff" stroke-width="1.2" opacity="0.45"/>
    <line x1="175" y1="2" x2="195" y2="26" stroke="#88ddff" stroke-width="1.2" opacity="0.45"/>
    <!-- 얼음 코어 하이라이트 -->
    <ellipse cx="110" cy="18" rx="60" ry="8" fill="#aaddff" opacity="0.2"/>
    <!-- 상단 하이라이트 -->
    <rect x="12" y="2" width="196" height="5" rx="2.5" fill="white" opacity="0.65"/>
    <!-- 결정 포인트들 -->
    <polygon points="55,2  61,2  58,7"  fill="#ddf4ff" opacity="0.7"/>
    <polygon points="90,2  98,2  94,8"  fill="#ddf4ff" opacity="0.7"/>
    <polygon points="125,2 133,2 129,8" fill="#ddf4ff" opacity="0.7"/>
    <polygon points="160,2 168,2 164,7" fill="#ddf4ff" opacity="0.7"/>
  </g>

  <!-- 테두리 -->
  <rect x="1" y="2" width="218" height="22" rx="11" fill="none" stroke="#66ccff" stroke-width="1.5"/>
</svg>
